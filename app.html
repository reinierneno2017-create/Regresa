<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Regresa Holguín</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:system-ui;padding:20px;background:#f1f5f9;color:#0f172a}
        .auth-container{background:white;border-radius:32px;padding:32px;max-width:450px;margin:60px auto;border:1px solid #e2e8f0}
        .auth-container input{width:100%;padding:12px;margin:12px 0;border:1px solid #cbd5e1;border-radius:24px}
        .auth-container button{width:100%;background:#f59e0b;border:none;padding:12px;border-radius:40px;font-weight:bold;cursor:pointer}
        .app-main{display:none}
        .user-header{display:flex;justify-content:space-between;background:white;padding:12px;border-radius:60px;margin-bottom:20px}
        .logout-btn{background:#ef4444;border:none;padding:6px 18px;border-radius:30px;color:white;cursor:pointer}
        .tabs{display:flex;gap:6px;margin-bottom:20px;background:white;padding:8px;border-radius:60px}
        .tab{background:transparent;border:none;padding:10px 20px;border-radius:40px;cursor:pointer}
        .tab.active{background:#f59e0b;color:white}
        .card{background:white;border-radius:28px;padding:24px;margin-bottom:20px;border:1px solid #e2e8f0}
        input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:20px;margin:5px 0}
        button.primary{background:#f59e0b;border:none;padding:12px;border-radius:40px;width:100%;cursor:pointer}
        .reporte-item{background:#f8fafc;border-radius:20px;padding:16px;margin-bottom:16px;border-left:5px solid #f59e0b}
        .footer{text-align:center;padding:20px;color:#475569;font-size:12px}
        .refresh-floating{position:fixed;bottom:20px;left:20px;background:#f59e0b;width:50px;height:50px;border-radius:50%;border:none;font-size:20px;cursor:pointer}
        .donate-floating{position:fixed;bottom:20px;right:20px;background:#f59e0b;width:50px;height:50px;border-radius:50%;border:none;font-size:20px;cursor:pointer}
    </style>
</head>
<body>

<div id="authPanel" class="auth-container">
    <h2>🔐 REGRESA HOLGUÍN</h2>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button id="btnLogin">Iniciar sesión</button>
    <button id="btnRegister" style="background:#3b82f6">Registrarme</button>
</div>

<div id="appMain" class="app-main">
    <div class="user-header">
        <span>👤 <span id="currentUsername"></span></span>
        <button id="logoutBtn" class="logout-btn">Salir</button>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="perdidas">🔴 Pérdidas</button>
        <button class="tab" data-tab="hallazgos">🟢 Hallazgos</button>
        <button class="tab" data-tab="reportar">➕ Reportar</button>
    </div>
    <div id="tabPerdidas"><div class="card"><h3>⚠️ Pérdidas</h3><div id="perdidasList"></div></div></div>
    <div id="tabHallazgos" style="display:none"><div class="card"><h3>🔍 Hallazgos</h3><div id="hallazgosList"></div></div></div>
    <div id="tabReportar" style="display:none">
        <div class="card">
            <h3>📝 Nuevo reporte</h3>
            <select id="reportType"><option value="perdida">Perdí algo</option><option value="hallazgo">Encontré algo</option></select>
            <div id="formPerdida">
                <label>Tipo</label><select id="tipoPerdida"><option value="objeto">Objeto</option><option value="mascota">Mascota</option><option value="persona">Persona</option></select>
                <label>Descripción</label><textarea id="descPerdida"></textarea>
                <label>Municipio</label><select id="municipioPerdida"><option value="Holguín">Holguín</option><option value="Antilla">Antilla</option><option value="Báguanos">Báguanos</option><option value="Banes">Banes</option><option value="Gibara">Gibara</option><option value="Moa">Moa</option></select>
                <label>Teléfono</label><input id="telefonoPerdida">
            </div>
            <div id="formHallazgo" style="display:none">
                <label>Tipo</label><select id="tipoHallazgo"><option value="objeto">Objeto</option><option value="mascota">Mascota</option><option value="persona">Persona</option></select>
                <label>Descripción</label><textarea id="descHallazgo"></textarea>
                <label>Municipio</label><select id="municipioHallazgo"><option value="Holguín">Holguín</option><option value="Antilla">Antilla</option><option value="Báguanos">Báguanos</option><option value="Banes">Banes</option><option value="Gibara">Gibara</option><option value="Moa">Moa</option></select>
                <label>Teléfono</label><input id="telefonoHallazgo">
            </div>
            <button id="btnGuardar" class="primary">Guardar</button>
        </div>
    </div>
</div>
<div class="footer">REGRESA HOLGUÍN • Reynier Velázquez 2026</div>
<button id="refreshBtn" class="refresh-floating">🔄</button>
<button id="donateBtn" class="donate-floating">❤️</button>

<script>
// SOLO UNA DECLARACION DE SUPABASE - ESTA ES LA ÚNICA
const supabaseUrl = 'https://cpizvgfzyxsznsduinxf.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwaXp2Z2Z6eXhzem5zZHVpbnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzE1MzgsImV4cCI6MjA5MzE0NzUzOH0.TpQcfNV1nqyeP7L8vL0mXQ5Uc87Qm0H1yjcQF2yviXI';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let usuario = null;
let pestana = 'perdidas';

async function login(u,p){
    let {data} = await supabase.from('usuarios').select('*').eq('username',u).eq('password',p).single();
    if(!data) return false;
    usuario = data;
    localStorage.setItem('user',JSON.stringify(usuario));
    return true;
}

async function registrar(u,p){
    let {error} = await supabase.from('usuarios').insert([{username:u,password:p}]);
    return !error;
}

async function cargarPerdidas(){
    let {data} = await supabase.from('perdidas').select('*').eq('estado','activo');
    let html = '';
    (data||[]).forEach(p=>{
        html += `<div class="reporte-item"><b>${p.tipo}</b><br>${p.descripcion}<br>📍 ${p.municipio}<br>📞 ${p.telefono}<br><button onclick="alert('Contacto: ${p.telefono}')">Contactar</button></div>`;
    });
    document.getElementById('perdidasList').innerHTML = html || 'Sin pérdidas';
}

async function cargarHallazgos(){
    let {data} = await supabase.from('hallazgos').select('*').eq('estado','activo');
    let html = '';
    (data||[]).forEach(h=>{
        html += `<div class="reporte-item"><b>${h.tipo}</b><br>${h.descripcion}<br>📍 ${h.municipio}<br>📞 ${h.telefono}<br><button onclick="alert('Contacto: ${h.telefono}')">Contactar</button></div>`;
    });
    document.getElementById('hallazgosList').innerHTML = html || 'Sin hallazgos';
}

document.getElementById('btnLogin').onclick = async()=>{
    let u = document.getElementById('loginUser').value;
    let p = document.getElementById('loginPass').value;
    if(await login(u,p)){
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('appMain').style.display = 'block';
        document.getElementById('currentUsername').innerText = u;
        cargarPerdidas();
    } else alert('Error');
};

document.getElementById('btnRegister').onclick = async()=>{
    let u = document.getElementById('loginUser').value;
    let p = document.getElementById('loginPass').value;
    if(await registrar(u,p)) alert('Registrado. Inicia sesión');
    else alert('Usuario existe');
};

document.getElementById('logoutBtn').onclick = ()=>{
    usuario=null;
    localStorage.removeItem('user');
    document.getElementById('authPanel').style.display = 'block';
    document.getElementById('appMain').style.display = 'none';
};

document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        pestana = t.dataset.tab;
        document.getElementById('tabPerdidas').style.display = pestana=='perdidas'?'block':'none';
        document.getElementById('tabHallazgos').style.display = pestana=='hallazgos'?'block':'none';
        document.getElementById('tabReportar').style.display = pestana=='reportar'?'block':'none';
        if(pestana=='perdidas') cargarPerdidas();
        if(pestana=='hallazgos') cargarHallazgos();
    };
});

document.getElementById('reportType').onchange = (e)=>{
    let v = e.target.value;
    document.getElementById('formPerdida').style.display = v=='perdida'?'block':'none';
    document.getElementById('formHallazgo').style.display = v=='hallazgo'?'block':'none';
};

document.getElementById('btnGuardar').onclick = async()=>{
    let tipo = document.getElementById('reportType').value;
    if(tipo=='perdida'){
        let data = {
            id: Date.now()+'-'+Math.random(),
            owner: usuario.username,
            tipo: document.getElementById('tipoPerdida').value,
            descripcion: document.getElementById('descPerdida').value,
            municipio: document.getElementById('municipioPerdida').value,
            telefono: document.getElementById('telefonoPerdida').value,
            estado: 'activo'
        };
        await supabase.from('perdidas').insert([data]);
        alert('Pérdida registrada');
        document.querySelector('.tab[data-tab="perdidas"]').click();
    } else {
        let data = {
            id: Date.now()+'-'+Math.random(),
            owner: usuario.username,
            tipo: document.getElementById('tipoHallazgo').value,
            descripcion: document.getElementById('descHallazgo').value,
            municipio: document.getElementById('municipioHallazgo').value,
            telefono: document.getElementById('telefonoHallazgo').value,
            estado: 'activo'
        };
        await supabase.from('hallazgos').insert([data]);
        alert('Hallazgo registrado');
        document.querySelector('.tab[data-tab="hallazgos"]').click();
    }
};

document.getElementById('refreshBtn').onclick = ()=> location.reload();
document.getElementById('donateBtn').onclick = ()=> {navigator.clipboard.writeText('9204 1299 7573 6440'); alert('Tarjeta copiada');};

let saved = localStorage.getItem('user');
if(saved){
    usuario = JSON.parse(saved);
    document.getElementById('authPanel').style.display = 'none';
    document.getElementById('appMain').style.display = 'block';
    document.getElementById('currentUsername').innerText = usuario.username;
    cargarPerdidas();
}
</script>
</body>
</html>
