<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regresa Holguín</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;padding:20px;background:#f1f5f9;color:#0f172a}
        .auth-container{background:white;border-radius:32px;padding:32px;max-width:450px;margin:60px auto;border:1px solid #e2e8f0}
        .auth-container input{width:100%;padding:12px;margin:12px 0;border:1px solid #cbd5e1;border-radius:24px}
        .auth-container button{width:100%;background:#f59e0b;border:none;padding:12px;border-radius:40px;font-weight:bold;cursor:pointer}
        .app-main{display:none}
        .user-header{display:flex;justify-content:space-between;background:white;padding:12px 24px;border-radius:60px;margin-bottom:24px}
        .logout-btn{background:#ef4444;border:none;padding:6px 18px;border-radius:30px;color:white;cursor:pointer}
        .tabs{display:flex;gap:6px;margin-bottom:24px;background:white;padding:8px;border-radius:60px}
        .tab{background:transparent;border:none;padding:10px 20px;border-radius:40px;cursor:pointer}
        .tab.active{background:#f59e0b;color:white}
        .card{background:white;border-radius:28px;padding:24px;margin-bottom:24px;border:1px solid #e2e8f0}
        .card h3{color:#f59e0b;margin-bottom:20px}
        input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:20px;margin:5px 0 15px}
        button.primary{background:#f59e0b;border:none;padding:12px;border-radius:40px;font-weight:bold;width:100%;cursor:pointer}
        .reporte-item{background:#f8fafc;border-radius:20px;padding:16px;margin-bottom:16px;border-left:5px solid #f59e0b}
        .badge{display:inline-block;background:#e2e8f0;padding:4px 12px;border-radius:50px;font-size:0.7rem;margin-right:8px}
        .footer{text-align:center;padding:24px;color:#475569;font-size:0.8rem;border-top:1px solid #e2e8f0;margin-top:40px}
        .refresh-floating{position:fixed;bottom:20px;left:20px;background:#f59e0b;width:56px;height:56px;border-radius:50%;border:none;font-size:24px;cursor:pointer}
        .donate-floating{position:fixed;bottom:20px;right:20px;background:#f59e0b;width:56px;height:56px;border-radius:50%;border:none;font-size:24px;cursor:pointer}
        @media(max-width:650px){body{padding:12px}}
    </style>
</head>
<body>
<div id="authPanel" class="auth-container">
    <h2>🔐 REGRESA HOLGUÍN</h2>
    <p style="margin-bottom:20px">Objetos, mascotas y personas extraviadas<br>📍 Datos en la nube</p>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button id="btnLogin">Iniciar sesión</button>
    <button id="btnRegister" style="background:#3b82f6">Registrarme</button>
</div>

<div id="appMain" class="app-main">
    <div class="user-header">
        <div>👤 <span id="currentUsername"></span></div>
        <button id="logoutBtn" class="logout-btn">Salir</button>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="perdidas">🔴 Pérdidas</button>
        <button class="tab" data-tab="hallazgos">🟢 Hallazgos</button>
        <button class="tab" data-tab="misReportes">📋 Mis reportes</button>
        <button class="tab" data-tab="reportar">➕ Reportar</button>
        <button class="tab" data-tab="matches">🔗 Coincidencias</button>
    </div>
    <div id="tabPerdidas"><div class="card"><h3>⚠️ Pérdidas activas</h3><div id="perdidasList"></div></div></div>
    <div id="tabHallazgos" style="display:none"><div class="card"><h3>🔍 Hallazgos activos</h3><div id="hallazgosList"></div></div></div>
    <div id="tabMisReportes" style="display:none"><div class="card"><h3>📦 Mis pérdidas</h3><div id="misPerdidasList"></div></div><div class="card"><h3>🤲 Mis hallazgos</h3><div id="misHallazgosList"></div></div></div>
    <div id="tabReportar" style="display:none">
        <div class="card">
            <h3>📝 Reportar algo</h3>
            <select id="reportType"><option value="perdida">📌 Perdí algo</option><option value="hallazgo">🤲 Encontré algo</option></select>
            <div id="formPerdida">
                <label>Tipo</label><select id="tipoPerdida"><option value="objeto">Objeto</option><option value="mascota">Mascota</option><option value="persona">Persona</option></select>
                <label>Descripción *</label><textarea id="descPerdida" placeholder="Color, señas..."></textarea>
                <label>Municipio *</label><select id="municipioPerdida"><option value="">Selecciona</option><option value="Antilla">Antilla</option><option value="Holguín">Holguín</option><option value="Gibara">Gibara</option><option value="Moa">Moa</option><option value="Banes">Banes</option></select>
                <label>Teléfono *</label><input type="tel" id="telefonoPerdida" placeholder="+53">
                <label>¿Recompensa?</label><select id="recompensaSiNo"><option value="no">No</option><option value="si">Sí</option></select>
                <div id="camposRecompensa" style="display:none"><input type="text" id="montoRecompensa" placeholder="Ej: 1000 CUP"></div>
            </div>
            <div id="formHallazgo" style="display:none">
                <label>Tipo</label><select id="tipoHallazgo"><option value="objeto">Objeto</option><option value="mascota">Mascota</option><option value="persona">Persona</option></select>
                <label>Descripción *</label><textarea id="descHallazgo" placeholder="Color, señas..."></textarea>
                <label>Municipio *</label><select id="municipioHallazgo"><option value="">Selecciona</option><option value="Antilla">Antilla</option><option value="Holguín">Holguín</option><option value="Gibara">Gibara</option><option value="Moa">Moa</option><option value="Banes">Banes</option></select>
                <label>Teléfono *</label><input type="tel" id="telefonoHallazgo" placeholder="+53">
                <label>¿Esperas recompensa?</label><select id="esperaRecompensa"><option value="no">No</option><option value="si">Sí</option></select>
            </div>
            <button id="btnEnviarReporte" class="primary">✅ Guardar</button>
        </div>
    </div>
    <div id="tabMatches" style="display:none"><div class="card"><h3>💡 Posibles coincidencias</h3><div id="matchesList"></div></div></div>
</div>
<div class="footer">🐾 REGRESA HOLGUÍN • Reynier Velázquez Morales 2026</div>
<button id="refreshBtn" class="refresh-floating">🔄</button>
<button id="donateBtn" class="donate-floating">❤️</button>

<script>
// ========== ESTA ES LA ÚNICA DECLARACIÓN DE SUPABASE ==========
const MI_SUPABASE_URL = 'https://cpizvgfzyxsznsduinxf.supabase.co';
const MI_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwaXp2Z2Z6eXhzem5zZHVpbnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzE1MzgsImV4cCI6MjA5MzE0NzUzOH0.TpQcfNV1nqyeP7L8vL0mXQ5Uc87Qm0H1yjcQF2yviXI';
const MiSupabase = window.supabase.createClient(MI_SUPABASE_URL, MI_SUPABASE_KEY);

let usuarioActual = null;
let pestanaActual = 'perdidas';

function generarId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 8); }

async function login(u,p){
    let {data,error} = await MiSupabase.from('usuarios').select('*').eq('username',u).eq('password',p).single();
    if(error || !data) return false;
    usuarioActual = data;
    localStorage.setItem('usuario_actual', JSON.stringify(usuarioActual));
    return true;
}

async function registrar(u,p){
    let {error} = await MiSupabase.from('usuarios').insert([{username:u, password:p}]);
    return !error;
}

async function cargarPerdidas(){
    let {data} = await MiSupabase.from('perdidas').select('*').eq('estado','activo');
    let html = '';
    (data||[]).forEach(p=>{
        html += `<div class="reporte-item"><span class="badge">${p.tipo}</span><span class="badge">📍 ${p.municipio}</span><p><strong>${p.descripcion}</strong><br>📞 ${p.telefono}</p><button onclick="alert('Contacto: ${p.telefono}')">📞 Contactar</button></div>`;
    });
    document.getElementById('perdidasList').innerHTML = html || '<div style="text-align:center;padding:40px">Sin pérdidas</div>';
}

async function cargarHallazgos(){
    let {data} = await MiSupabase.from('hallazgos').select('*').eq('estado','activo');
    let html = '';
    (data||[]).forEach(h=>{
        html += `<div class="reporte-item"><span class="badge">${h.tipo}</span><span class="badge">📍 ${h.municipio}</span><p><strong>${h.descripcion}</strong><br>📞 ${h.telefono}</p><button onclick="alert('Contacto: ${h.telefono}')">📞 Contactar</button></div>`;
    });
    document.getElementById('hallazgosList').innerHTML = html || '<div style="text-align:center;padding:40px">Sin hallazgos</div>';
}

async function guardarPerdida(){
    let data = {
        id: generarId(),
        owner: usuarioActual.username,
        tipo: document.getElementById('tipoPerdida').value,
        descripcion: document.getElementById('descPerdida').value,
        municipio: document.getElementById('municipioPerdida').value,
        telefono: document.getElementById('telefonoPerdida').value,
        recompensa_ofrece: document.getElementById('recompensaSiNo').value === 'si',
        recompensa_monto: document.getElementById('montoRecompensa').value,
        estado: 'activo'
    };
    if(!data.descripcion || !data.municipio || !data.telefono) { alert('Complete datos'); return; }
    let {error} = await MiSupabase.from('perdidas').insert([data]);
    if(error) alert('Error: '+error.message);
    else { alert('✅ Pérdida registrada'); document.querySelector('.tab[data-tab="perdidas"]').click(); }
}

async function guardarHallazgo(){
    let data = {
        id: generarId(),
        owner: usuarioActual.username,
        tipo: document.getElementById('tipoHallazgo').value,
        descripcion: document.getElementById('descHallazgo').value,
        municipio: document.getElementById('municipioHallazgo').value,
        telefono: document.getElementById('telefonoHallazgo').value,
        espera_recompensa: document.getElementById('esperaRecompensa').value,
        estado: 'activo'
    };
    if(!data.descripcion || !data.municipio || !data.telefono) { alert('Complete datos'); return; }
    let {error} = await MiSupabase.from('hallazgos').insert([data]);
    if(error) alert('Error: '+error.message);
    else { alert('✅ Hallazgo registrado'); document.querySelector('.tab[data-tab="hallazgos"]').click(); }
}

document.getElementById('btnLogin').onclick = async()=>{
    let u = document.getElementById('loginUser').value.trim();
    let p = document.getElementById('loginPass').value;
    if(await login(u,p)){
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('appMain').style.display = 'block';
        document.getElementById('currentUsername').innerText = u;
        cargarPerdidas();
    } else alert('Usuario o contraseña incorrectos');
};

document.getElementById('btnRegister').onclick = async()=>{
    let u = document.getElementById('loginUser').value.trim();
    let p = document.getElementById('loginPass').value;
    if(await registrar(u,p)) alert('Registrado. Inicia sesión');
    else alert('Usuario ya existe');
};

document.getElementById('logoutBtn').onclick = ()=>{
    usuarioActual = null;
    localStorage.removeItem('usuario_actual');
    document.getElementById('authPanel').style.display = 'block';
    document.getElementById('appMain').style.display = 'none';
};

document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        pestanaActual = t.dataset.tab;
        document.getElementById('tabPerdidas').style.display = pestanaActual=='perdidas'?'block':'none';
        document.getElementById('tabHallazgos').style.display = pestanaActual=='hallazgos'?'block':'none';
        document.getElementById('tabMisReportes').style.display = pestanaActual=='misReportes'?'block':'none';
        document.getElementById('tabReportar').style.display = pestanaActual=='reportar'?'block':'none';
        document.getElementById('tabMatches').style.display = pestanaActual=='matches'?'block':'none';
        if(pestanaActual=='perdidas') cargarPerdidas();
        if(pestanaActual=='hallazgos') cargarHallazgos();
    };
});

document.getElementById('reportType').onchange = (e)=>{
    let v = e.target.value;
    document.getElementById('formPerdida').style.display = v=='perdida'?'block':'none';
    document.getElementById('formHallazgo').style.display = v=='hallazgo'?'block':'none';
};
document.getElementById('recompensaSiNo').onchange = (e)=>{
    document.getElementById('camposRecompensa').style.display = e.target.value=='si'?'block':'none';
};
document.getElementById('btnEnviarReporte').onclick = ()=>{
    if(document.getElementById('reportType').value == 'perdida') guardarPerdida();
    else guardarHallazgo();
};
document.getElementById('refreshBtn').onclick = ()=> location.reload();
document.getElementById('donateBtn').onclick = ()=>{ navigator.clipboard.writeText('9204 1299 7573 6440'); alert('Tarjeta copiada'); };

let guardado = localStorage.getItem('usuario_actual');
if(guardado){
    usuarioActual = JSON.parse(guardado);
    document.getElementById('authPanel').style.display = 'none';
    document.getElementById('appMain').style.display = 'block';
    document.getElementById('currentUsername').innerText = usuarioActual.username;
    cargarPerdidas();
}
</script>
</body>
</html>
